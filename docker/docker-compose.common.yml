name: Deploy to OCI

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 1) Checkout
      # --------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------
      # 2) JDK 설정
      # --------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --------------------------
      # 3) 빌드 전 리소스 파일 생성
      # --------------------------
      - name: Create FCM key file
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.FCM_SERVICE_ACCOUNT }}' > src/main/resources/firebase-adminsdk.json

      - name: Create .env file
        shell: bash
        run: printf "%s" "${{ secrets.ENV_FILE }}" > .env

      # --------------------------
      # 4) Gradle 빌드
      # --------------------------
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test
          cp $(ls build/libs/*.jar | grep -v plain | head -n 1) app.jar

      # --------------------------
      # 5) Docker 이미지 빌드 → tar.gz 저장
      #    (ghcr.io 대신 로컬 이미지명 사용)
      # --------------------------
      - name: Build Docker image
        run: |
          docker build -t tinybite-server:latest .
          docker save tinybite-server:latest | gzip > tinybite-server.tar.gz

      # --------------------------
      # 6) SCP로 서버에 전송
      # --------------------------
      - name: Copy files to OCI server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "tinybite-server.tar.gz,.env,docker/"
          target: "/home/ubuntu/tinybite/"

      # --------------------------
      # 7) 서버에서 이미지 load & blue/green 배포
      # --------------------------
      - name: Deploy on OCI server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/tinybite

            # docker 폴더 파일을 작업 디렉토리로 이동
            cp docker/.env .env 2>/dev/null || true

            echo "📦 이미지 로드 중..."
            sudo docker load < tinybite-server.tar.gz

            # docker-compose.blue.yml의 image를 로컬 이미지명으로 교체
            sed -i 's|image: ghcr.io/tinybite-2025/tinybite-server:latest|image: tinybite-server:latest|g' docker/docker-compose.blue.yml
            sed -i 's|image: ghcr.io/tinybite-2025/tinybite-server:latest|image: tinybite-server:latest|g' docker/docker-compose.green.yml

            echo "🔍 현재 실행 중인 컨테이너 확인..."
            BLUE_RUNNING=$(sudo docker ps --filter "name=tinybite-api-blue" --format "{{.Names}}" | wc -l)

            if [ "$BLUE_RUNNING" -gt "0" ]; then
              echo "🟢 Green 으로 배포..."
              sudo docker compose -f docker/docker-compose.common.yml \
                                  -f docker/docker-compose.green.yml up -d --remove-orphans
              sudo docker compose -f docker/docker-compose.blue.yml down || true
            else
              echo "🔵 Blue 로 배포..."
              sudo docker compose -f docker/docker-compose.common.yml \
                                  -f docker/docker-compose.blue.yml up -d --remove-orphans
              sudo docker compose -f docker/docker-compose.green.yml down || true
            fi

            echo "🧹 정리 중..."
            rm -f tinybite-server.tar.gz
            sudo docker image prune -f

            echo "✅ 배포 완료"