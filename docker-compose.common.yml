services:
  tinybite-api:
    image: ghcr.io/tinybite-2025/tinybite-server:latest
    container_name: tinybite-api-blue
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - tinybite-network

  mysql:
    container_name: mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tinybite
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tinybite-network

  nginx:
    container_name: nginx
    image: nginx:1.27.4
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/tinybite/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /home/ubuntu/tinybite/data/certbot/conf:/etc/letsencrypt
      - /home/ubuntu/tinybite/data/certbot/www:/var/www/certbot
    restart: always
    depends_on:
      - tinybite-api
    networks:
      - tinybite-network

  redis:
    container_name: redis
    image: redis:7.2.4
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    env_file:
      - .env
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tinybite-network

  certbot:
    container_name: certbot
    image: certbot/certbot
    volumes:
      - /home/ubuntu/tinybite/data/certbot/conf:/etc/letsencrypt
      - /home/ubuntu/tinybite/data/certbot/www:/var/www/certbot
    entrypoint: '/bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"'
    networks:
      - tinybite-network

volumes:
  redis_data:
  mysql_data:

networks:
  tinybite-network:
    driver: bridge