name: Deploy to OCI

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 1) Checkout
      # --------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------
      # 2) JDK 설정
      # --------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --------------------------
      # 3) 빌드 전 리소스 파일 생성
      # --------------------------
      - name: Create FCM key file
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.FCM_SERVICE_ACCOUNT }}' > src/main/resources/firebase-adminsdk.json

      - name: Create .env file
        shell: bash
        run: printf "%s" "${{ secrets.ENV_FILE }}" > .env

      # --------------------------
      # 4) Gradle 빌드
      # --------------------------
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test
          cp $(ls build/libs/*.jar | grep -v plain | head -n 1) app.jar

      # --------------------------
      # 5) Docker 빌드 & ghcr.io 푸시
      # --------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --------------------------
      # 6) 서버로 파일 전송 (SCP)
      # --------------------------
      - name: Copy files to OCI server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: ".env,docker-compose.yml,nginx/"
          target: "/home/ubuntu/tinybite/"

      # --------------------------
      # 7) OCI 서버 배포 (SSH)
      # --------------------------
      - name: Deploy to OCI server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/tinybite

            # ghcr.io 로그인
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io \
                -u ${{ github.actor }} \
                --password-stdin

            # 최신 이미지 pull
            export APP_IMAGE="ghcr.io/${{ github.repository }}:latest"
            docker compose pull

            # 새 컨테이너 실행
            docker compose up -d --remove-orphans

            # 이미지 정리
            docker image prune -f

            echo "✅ 배포 완료: $APP_IMAGE"